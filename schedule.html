                  <th style="padding:8px 6px; border:1px solid #dadce0; font-weight:600; color:#5f6368; width:36px;"></th>
                </tr>
              </thead>
              <tbody id="ictRequestBody"></tbody>
            </table>
          </div>
          <button type="button" class="ict-add-btn" onclick="addIctRow()"><span class="plus">+</span>行を追加</button>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" id="submitBtn" onclick="submitForm()">候補日を送信する</button>
        </div>
        <div class="message" id="message"></div>
      </div>
    </div>
  </div>

  <div class="footer">FSL鹿児島県ICT支援スケジュールシステム</div>

<script>
  // サーバーからのデータ
  var userData = JSON.parse(<?!= JSON.stringify(userData) ?>);
  var settings = JSON.parse(<?!= JSON.stringify(settings) ?>);
  var existing = JSON.parse(<?!= JSON.stringify(existing) ?>);
  var saHolidays = JSON.parse(<?!= JSON.stringify(holidays) ?>);
  var saMeetings = JSON.parse(<?!= JSON.stringify(meetings) ?>);
  var saStaffOff = JSON.parse(<?!= JSON.stringify(staffOff) ?>);
  var schoolSchedule = JSON.parse(<?!= JSON.stringify(schoolSchedule) ?>);
  var staffFullSchedule = JSON.parse(<?!= JSON.stringify(staffFullSchedule) ?>);
  var myStaffName = <?!= JSON.stringify(staffName) ?>;
  var supportCategory = <?!= JSON.stringify(supportCategory) ?>; // '離島' or '通常'

  var NO_PREFERENCE = '特に指定しない';

  // 日本の祝日（2026-2027年）
  var HOLIDAYS_2026 = {
    '2026-01-01': '元日', '2026-01-12': '成人の日',
    '2026-02-11': '建国記念の日', '2026-02-23': '天皇誕生日',
    '2026-03-20': '春分の日',
    '2026-04-29': '昭和の日',
    '2026-05-03': '憲法記念日', '2026-05-04': 'みどりの日', '2026-05-05': 'こどもの日', '2026-05-06': '振替休日',
    '2026-07-20': '海の日',
    '2026-08-11': '山の日',
    '2026-09-21': '敬老の日', '2026-09-23': '秋分の日',
    '2026-10-12': 'スポーツの日',
    '2026-11-03': '文化の日', '2026-11-23': '勤労感謝の日',
    '2027-01-01': '元日', '2027-01-11': '成人の日',
    '2027-02-11': '建国記念の日', '2027-02-23': '天皇誕生日',
    '2027-03-21': '春分の日'
  };

  // SA設定の特別休日をマージ
  for (var i = 0; i < saHolidays.length; i++) {
    HOLIDAYS_2026[saHolidays[i].date] = saHolidays[i].name || '特別休日';
  }

  // 定例会・支援員休日をマップ化
  var meetingMap = {};
  for (var i = 0; i < saMeetings.length; i++) {
    meetingMap[saMeetings[i].date] = saMeetings[i].name || '定例会';
  }
  var staffOffMap = {};
  for (var i = 0; i < saStaffOff.length; i++) {
    var key = saStaffOff[i].date;
    if (!staffOffMap[key]) staffOffMap[key] = [];
    staffOffMap[key].push(saStaffOff[i].staffName);
  }
  // 確定スケジュールを日付マップ化
  var schoolSchedMap = {};
  for (var i = 0; i < schoolSchedule.length; i++) {
    schoolSchedMap[schoolSchedule[i].date] = schoolSchedule[i];
  }

  // カレンダー表示中の年月
  var calYear, calMonth;

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    renderUserInfo();
    renderAnnouncement();
    renderStatus();

    // 確定済みスケジュールを月ごとに表示（対象年月に依存しない）
    renderConfirmedSchedules();

    // 受付中の場合のみ候補日入力フォームとカレンダーを表示
    if (settings.targetMonth) {
      var parts = settings.targetMonth.split('-');
      calYear = parseInt(parts[0], 10);
      calMonth = parseInt(parts[1], 10);

      if (settings.status === '受付中') {
        document.getElementById('calendarCard').style.display = 'block';
        renderCalendar();
        document.getElementById('formArea').style.display = 'block';
        renderCandidates('visit1', 'v1');
        renderCandidates('visit2', 'v2');
        renderIctRequestTable([]);
        initIslandMode();
        restoreExisting();
        // 市町村校は支援種別を訪問固定にする（既存データがオンラインだった場合の上書き含む）
        initMunicipalMode();
      }
    }
  }

  function changeCalMonth(delta) {
    calMonth += delta;
    if (calMonth > 12) { calMonth = 1; calYear++; }
    if (calMonth < 1) { calMonth = 12; calYear--; }
    renderCalendar();
  }

  function renderUserInfo() {
    var u = userData;
    var initial = u.name ? u.name.charAt(0) : '?';
    document.getElementById('userInfoArea').innerHTML =
      '<span>' + esc(u.name) + '（' + esc(u.schoolName) + '）</span>' +
      '<div class="avatar">' + esc(initial) + '</div>';
  }

  function renderAnnouncement() {
    var area = document.getElementById('announcementBanner');
    var ann = settings && settings.announcement ? String(settings.announcement).trim() : '';
    if (!ann) {
      area.innerHTML = '';
      return;
    }
    area.innerHTML =
      '<div class="announcement-banner">' +
      '  <div class="ann-title"><span>&#128227;</span>SAからのお知らせ</div>' +
      '  <div class="ann-body">' + esc(ann) + '</div>' +
      '</div>';
  }

  function renderStatus() {
    var banner = document.getElementById('statusBanner');
    if (!settings.targetMonth || !settings.status) {
      banner.innerHTML =
        '<div class="status-banner none"><span class="badge">---</span>' +
        '<span>現在、候補日の受付は行っていません。</span></div>';
      return;
    }

    var monthLabel = formatMonth(settings.targetMonth);
    if (settings.status === '受付中') {
      var deadlineText = settings.deadline ? '（締切：' + formatDateLabel(settings.deadline) + '）' : '';
      banner.innerHTML =
        '<div class="status-banner"><span class="badge">受付中</span>' +
        '<span>' + esc(monthLabel) + 'の候補日を入力してください' + esc(deadlineText) + '</span></div>';
    } else {
      banner.innerHTML =
        '<div class="status-banner closed"><span class="badge">締切</span>' +
        '<span>' + esc(monthLabel) + 'の候補日受付は終了しました。</span></div>';
    }

    if (existing && existing.submittedAt) {
      var submitMsg = settings.status === '受付中'
        ? '送信済み（' + esc(existing.submittedAt) + '）- 内容を修正して再送信できます'
        : '送信済み（' + esc(existing.submittedAt) + '）';
      document.getElementById('submittedBanner').innerHTML =
        '<div class="submitted-banner"><span class="icon">&#10003;</span>' +
        '<span>' + submitMsg + '</span></div>';
    }
  }

  // ===== カレンダー =====

  function renderCalendar() {
    var year = calYear;
    var month = calMonth;

    // 対象月かどうか
    var targetParts = settings.targetMonth.split('-');
    var isTargetMonth = (year === parseInt(targetParts[0],10) && month === parseInt(targetParts[1],10));
    var titleSuffix = isTargetMonth ? '（対象月）' : '';

    document.getElementById('calendarTitle').textContent =
      year + '年' + month + '月' + titleSuffix;

    var firstDay = new Date(year, month - 1, 1);
    var lastDay = new Date(year, month, 0);
    var startDow = firstDay.getDay(); // 0=Sun
    var daysInMonth = lastDay.getDate();

    var html = '<table class="mini-cal"><thead><tr>';
    var dayNames = ['日', '月', '火', '水', '木', '金', '土'];
    for (var i = 0; i < 7; i++) {
      html += '<th>' + dayNames[i] + '</th>';
    }
    html += '</tr></thead><tbody><tr>';

    // 空セル
    for (var i = 0; i < startDow; i++) {
      html += '<td class="empty"></td>';
    }

    var cellCount = startDow;
    for (var d = 1; d <= daysInMonth; d++) {
      var dateStr = year + '-' + String(month).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      var dow = new Date(year, month - 1, d).getDay();
      var cls = '';
      var title = '';

      // 土日
      if (dow === 0 || dow === 6) {
        cls = 'weekend';
        title = dow === 0 ? '日曜日' : '土曜日';
      }
      // 祝日
      else if (HOLIDAYS_2026[dateStr]) {
        cls = 'holiday';
        title = HOLIDAYS_2026[dateStr];
      }
      // 定例会
      else if (meetingMap[dateStr]) {
        cls = 'holiday';
        title = meetingMap[dateStr];
      }
      // 支援員休日
      else if (staffOffMap[dateStr]) {
        cls = 'staff-off';
        title = staffOffMap[dateStr].join(', ') + ' 休み';
      }
      // 選択可能日
      else {
        cls = 'available';
      }

      html += '<td class="' + cls + '"' + (title ? ' title="' + esc(title) + '"' : '') + ' style="vertical-align:top; height:50px;">';
      html += '<div style="font-size:0.72rem; color:#5f6368; margin-bottom:1px;">' + d + '</div>';
      if (schoolSchedMap[dateStr]) {
        var sched = schoolSchedMap[dateStr];
        var staffShort = sched.staffName.split(/[\s　]/)[0];
        var isSubstitute = sched.origStaff && sched.origStaff !== '';
        var isOnline = sched.supportType === 'オンライン';
        var chipBg;
        if (isOnline) {
          chipBg = 'background:#f3e8fd; color:#6b21a8; border:1px solid #d8b4fe;';
        } else if (isSubstitute) {
          chipBg = 'background:#fff3e0; color:#e65100;';
        } else {
          chipBg = 'background:#e8f0fe; color:#1a73e8;';
        }
        var iconHtml = isOnline ? '<span style="margin-right:2px;">💻</span>' : '';
        var titleAttr = sched.timeSlot ? ' title="' + esc(sched.timeSlot + (isOnline ? ' (オンライン)' : '')) + '"' : '';
        html += '<div style="display:inline-block; padding:1px 5px; border-radius:3px; font-size:0.62rem; font-weight:600; ' + chipBg + '"' + titleAttr + '>';
        html += iconHtml + esc(staffShort) + (isSubstitute ? '(代行)' : '');
        html += '</div>';
      }
      html += '</td>';

      cellCount++;
      if (cellCount % 7 === 0 && d < daysInMonth) {
        html += '</tr><tr>';
      }
    }

    // 末尾の空セル
    var remaining = 7 - (cellCount % 7);
    if (remaining < 7) {
      for (var i = 0; i < remaining; i++) {
        html += '<td class="empty"></td>';
      }
    }

    html += '</tr></tbody></table>';

    // 凡例
    html += '<div class="legend">';
    html += '<div class="legend-item"><div class="legend-dot" style="background:#e6f4ea; border:1px solid #137333;"></div>選択可能日</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:#fce8e6;"></div>土日</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:#fef7e0;"></div>祝日・定例会</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:#f3e8fd;"></div>支援員休日</div>';
    html += '</div>';

    // 対象月の場合は全日程が候補対象
    if (isTargetMonth) {
      html += '<div class="range-labels">';
      html += '<div>対象月の平日から候補日を選択してください</div>';
      html += '</div>';
    }

    document.getElementById('calendarArea').innerHTML = html;
  }

  // ===== 候補日入力 =====

  // 対象月の日付範囲
  var targetMinDate = '';
  var targetMaxDate = '';
  if (settings.targetMonth) {
    var tp = settings.targetMonth.split('-');
    var tYear = parseInt(tp[0], 10);
    var tMonth = parseInt(tp[1], 10);
    targetMinDate = tYear + '-' + String(tMonth).padStart(2, '0') + '-01';
    var lastDayOfMonth = new Date(tYear, tMonth, 0).getDate();
    targetMaxDate = tYear + '-' + String(tMonth).padStart(2, '0') + '-' + String(lastDayOfMonth).padStart(2, '0');
  }

  // ICT要望テーブル（可変行）
  var ictRowSeq = 0;
  var ICT_DEFAULT_ROWS = 3;
  // デフォルト3行のplaceholder（授業支援・校務支援・設定）
  var ICT_DEFAULT_PLACEHOLDERS = [
    { content: '例：2年生のロイロノートで提出箱の使い方を教えてほしい', name: '2年担任 山田', room: '2年1組' },
    { content: '例：成績集計のExcel関数の組み方を教えてほしい',           name: '教頭',         room: '職員室' },
    { content: '例：新しく届いたタブレットの初期設定をしてほしい',         name: 'ICT担当 佐藤', room: 'PC教室' }
  ];
  var ICT_GENERIC_PLACEHOLDER = { content: '支援してほしい内容', name: '依頼者氏名', room: '場所' };

  function buildIctRow(content, name, room, ph) {
    ph = ph || ICT_GENERIC_PLACEHOLDER;
    ictRowSeq++;
    var rowId = 'ict_row_' + ictRowSeq;
    var tr = document.createElement('tr');
    tr.id = rowId;
    tr.innerHTML =
      '<td style="padding:4px 6px; border:1px solid #dadce0; text-align:center; color:#5f6368;" data-num></td>' +
      '<td style="padding:2px; border:1px solid #dadce0;"><input type="text" data-field="content" style="width:100%; border:none; padding:6px 4px; font-size:0.85rem; font-family:inherit;" placeholder="' + ph.content + '"></td>' +
      '<td style="padding:2px; border:1px solid #dadce0;"><input type="text" data-field="name" style="width:100%; border:none; padding:6px 4px; font-size:0.85rem; font-family:inherit;" placeholder="' + ph.name + '"></td>' +
      '<td style="padding:2px; border:1px solid #dadce0;"><input type="text" data-field="room" style="width:100%; border:none; padding:6px 4px; font-size:0.85rem; font-family:inherit;" placeholder="' + ph.room + '"></td>' +
      '<td style="padding:2px 6px; border:1px solid #dadce0; text-align:center;"><button type="button" class="ict-row-delete" title="この行を削除" onclick="removeIctRow(\'' + rowId + '\')">&#10005;</button></td>';
    if (content) tr.querySelector('[data-field="content"]').value = content;
    if (name) tr.querySelector('[data-field="name"]').value = name;
    if (room) tr.querySelector('[data-field="room"]').value = room;
    return tr;
  }

  function renumberIctRows() {
    var rows = document.querySelectorAll('#ictRequestBody tr');
    for (var i = 0; i < rows.length; i++) {
      var cell = rows[i].querySelector('[data-num]');
      if (cell) cell.textContent = (i + 1);
    }
  }

  function renderIctRequestTable(items) {
    var body = document.getElementById('ictRequestBody');
    body.innerHTML = '';
    ictRowSeq = 0;

    if (items && items.length > 0) {
      // 復元時: 値があるのでplaceholderはgeneric
      for (var i = 0; i < items.length; i++) {
        var it = items[i] || {};
        body.appendChild(buildIctRow(it.content || '', it.name || '', it.room || '', ICT_GENERIC_PLACEHOLDER));
      }
    } else {
      // 初期状態: 行ごとに具体例のplaceholder
      for (var i = 0; i < ICT_DEFAULT_ROWS; i++) {
        body.appendChild(buildIctRow('', '', '', ICT_DEFAULT_PLACEHOLDERS[i]));
      }
    }
    renumberIctRows();
  }

  function addIctRow() {
    var body = document.getElementById('ictRequestBody');
    body.appendChild(buildIctRow('', '', ''));
    renumberIctRows();
  }

  function removeIctRow(rowId) {
    var row = document.getElementById(rowId);
    if (!row) return;
    var body = document.getElementById('ictRequestBody');
    if (body.children.length <= 1) {
      // 最後の1行は中身だけクリアして残す
      var inputs = row.querySelectorAll('input');
      for (var i = 0; i < inputs.length; i++) inputs[i].value = '';
      return;
    }
    row.parentNode.removeChild(row);
    renumberIctRows();
  }

  var isIsland = (supportCategory === '離島');
  var isMunicipal = (supportCategory === '市町村');

  // 離島校の初期化（終日固定表示に切り替え）
  function initIslandMode() {
    if (!isIsland) return;
    for (var n = 1; n <= 2; n++) {
      document.getElementById('timeSlotVisitOptions' + n).style.display = 'none';
      document.getElementById('timeSlotIsland' + n).style.display = 'block';
    }
  }

  // 市町村校の初期化（オンライン選択肢を非表示に＋訪問固定）
  function initMunicipalMode() {
    if (!isMunicipal) return;
    for (var n = 1; n <= 2; n++) {
      var nameAttr = 'supportType' + (n === 1 ? '' : '2');
      var onlineRadio = document.querySelector('input[name="' + nameAttr + '"][value="オンライン"]');
      if (onlineRadio && onlineRadio.parentElement) {
        onlineRadio.parentElement.style.display = 'none';
      }
      var visitRadio = document.querySelector('input[name="' + nameAttr + '"][value="訪問"]');
      if (visitRadio) visitRadio.checked = true;
      onSupportTypeChange(n);
    }
  }

  // 支援種別切り替え
  function onSupportTypeChange(visitNum) {
    var radios = document.querySelectorAll('input[name="supportType' + (visitNum === 1 ? '' : '2') + '"]');
    var isOnline = false;
    for (var i = 0; i < radios.length; i++) {
      if (radios[i].checked && radios[i].value === 'オンライン') isOnline = true;
    }
    document.getElementById('timeSlotVisit' + visitNum).style.display = isOnline ? 'none' : 'block';
    document.getElementById('timeSlotOnline' + visitNum).style.display = isOnline ? 'block' : 'none';
  }

  // 2回目支援トグル
  function toggleSecondVisit() {
    var checked = document.getElementById('wantSecond').checked;
    document.getElementById('secondVisitArea').style.display = checked ? 'block' : 'none';
  }

  // オンライン時間バリデーション
  function validateOnlineTime(visitNum) {
    var start = document.getElementById('onlineStart' + visitNum).value;
    var end = document.getElementById('onlineEnd' + visitNum).value;
    var errEl = document.getElementById('onlineTimeError' + visitNum);
    if (!start || !end) { errEl.textContent = ''; return false; }
    var startMin = parseInt(start.split(':')[0]) * 60 + parseInt(start.split(':')[1]);
    var endMin = parseInt(end.split(':')[0]) * 60 + parseInt(end.split(':')[1]);
    if (endMin - startMin < 60) {
      errEl.textContent = '1時間以上を指定してください';
      return false;
    }
    errEl.textContent = '';
    return true;
  }

  // 時間帯取得ヘルパー
  function getTimeSlot(visitNum) {
    var radios = document.querySelectorAll('input[name="supportType' + (visitNum === 1 ? '' : '2') + '"]');
    var isOnline = false;
    for (var i = 0; i < radios.length; i++) {
      if (radios[i].checked && radios[i].value === 'オンライン') isOnline = true;
    }
    if (isOnline) {
      return document.getElementById('onlineStart' + visitNum).value + '-' + document.getElementById('onlineEnd' + visitNum).value;
    }
    if (isIsland) return '09:00-16:00';
    var timeRadios = document.querySelectorAll('input[name="timeSlot' + visitNum + '"]');
    for (var i = 0; i < timeRadios.length; i++) {
      if (timeRadios[i].checked) return timeRadios[i].value;
    }
    return '';
  }

  // 支援種別取得ヘルパー
  function getSupportType(visitNum) {
    var radios = document.querySelectorAll('input[name="supportType' + (visitNum === 1 ? '' : '2') + '"]');
    for (var i = 0; i < radios.length; i++) {
      if (radios[i].checked) return radios[i].value;
    }
    return '訪問';
  }

  function renderCandidates(containerId, prefix) {
    var container = document.getElementById(containerId + 'Candidates');
    var html = '<div class="candidates-grid">';
    var labels = ['第1候補', '第2候補', '第3候補'];

    for (var i = 0; i < 3; i++) {
      var n = i + 1;
      var radioName = prefix + 'c' + n + '_type';
      var dateId = prefix + 'c' + n + '_date';
      var errId = prefix + 'c' + n + '_err';

      html += '<div class="candidate-item">';
      html += '<div class="candidate-label">' + labels[i] + '<span class="required">*</span></div>';

      html += '<div class="choice-row">';
      html += '<input type="radio" name="' + radioName + '" id="' + radioName + '_date" value="date" checked onchange="onChoiceChange(\'' + prefix + 'c' + n + '\')">';
      html += '<label for="' + radioName + '_date">日付を指定</label>';
      html += '<input type="date" id="' + dateId + '"';
      if (targetMinDate) html += ' min="' + targetMinDate + '"';
      if (targetMaxDate) html += ' max="' + targetMaxDate + '"';
      html += ' onchange="validateDateInput(\'' + prefix + 'c' + n + '\')">';
      html += '</div>';
      html += '<div class="date-error" id="' + errId + '"></div>';

      html += '<div class="choice-row">';
      html += '<input type="radio" name="' + radioName + '" id="' + radioName + '_none" value="none" onchange="onChoiceChange(\'' + prefix + 'c' + n + '\')">';
      html += '<label for="' + radioName + '_none">特に指定しない</label>';
      html += '</div>';

      html += '</div>';
    }

    html += '</div>';
    container.innerHTML = html;
  }

  function onChoiceChange(fieldId) {
    var dateRadio = document.getElementById(fieldId + '_type_date');
    var dateInput = document.getElementById(fieldId + '_date');
    var errEl = document.getElementById(fieldId + '_err');
    dateInput.disabled = !dateRadio.checked;
    if (!dateRadio.checked) {
      dateInput.value = '';
      if (errEl) errEl.textContent = '';
    }
  }

  function validateDateInput(fieldId) {
    var dateInput = document.getElementById(fieldId + '_date');
    var errEl = document.getElementById(fieldId + '_err');
    if (!errEl) return;
    if (!dateInput.value) { errEl.textContent = ''; return; }
    var reason = getUnavailableReason(dateInput.value);
    if (reason) {
      errEl.textContent = 'この日は選択できません（' + reason + '）';
      dateInput.value = '';
    } else {
      errEl.textContent = '';
    }
  }

  function restoreExisting() {
    if (!existing) return;

    // 1回目 支援種別の復元
    if (existing.supportType) {
      var stRadios = document.querySelectorAll('input[name="supportType"]');
      for (var i = 0; i < stRadios.length; i++) {
        if (stRadios[i].value === existing.supportType) { stRadios[i].checked = true; break; }
      }
      onSupportTypeChange(1);
    }

    // 1回目 時間帯の復元
    if (existing.timeSlot) {
      if (existing.supportType === 'オンライン') {
        var parts = existing.timeSlot.split('-');
        if (parts.length === 2) {
          document.getElementById('onlineStart1').value = parts[0];
          document.getElementById('onlineEnd1').value = parts[1];
        }
      } else {
        var tsRadios = document.querySelectorAll('input[name="timeSlot1"]');
        for (var i = 0; i < tsRadios.length; i++) {
          if (tsRadios[i].value === existing.timeSlot) { tsRadios[i].checked = true; break; }
        }
      }
    }

    // 候補日の復元
    var fields = ['v1c1', 'v1c2', 'v1c3', 'v2c1', 'v2c2', 'v2c3'];
    for (var i = 0; i < fields.length; i++) {
      var key = fields[i];
      var val = existing[key];
      if (!val) continue;

      if (val === NO_PREFERENCE) {
        var noneRadio = document.getElementById(key + '_type_none');
        if (noneRadio) {
          noneRadio.checked = true;
          onChoiceChange(key);
        }
      } else {
        var dateInput = document.getElementById(key + '_date');
        if (dateInput && val) {
          var d = new Date(val);
          if (!isNaN(d.getTime())) {
            dateInput.value = fmtDateInput(d);
          }
        }
      }
    }

    // 2回目支援の復元
    if (existing.wantSecond) {
      document.getElementById('wantSecond').checked = true;
      toggleSecondVisit();

      // 2回目 支援種別の復元
      if (existing.supportType2) {
        var st2Radios = document.querySelectorAll('input[name="supportType2"]');
        for (var i = 0; i < st2Radios.length; i++) {
          if (st2Radios[i].value === existing.supportType2) { st2Radios[i].checked = true; break; }
        }
        onSupportTypeChange(2);
      }

      // 2回目 時間帯の復元
      if (existing.timeSlot2) {
        if (existing.supportType2 === 'オンライン') {
          var parts2 = existing.timeSlot2.split('-');
          if (parts2.length === 2) {
            document.getElementById('onlineStart2').value = parts2[0];
            document.getElementById('onlineEnd2').value = parts2[1];
          }
        } else {
          var ts2Radios = document.querySelectorAll('input[name="timeSlot2"]');
          for (var i = 0; i < ts2Radios.length; i++) {
            if (ts2Radios[i].value === existing.timeSlot2) { ts2Radios[i].checked = true; break; }
          }
        }
      }
    }

    if (existing.comment) {
      document.getElementById('comment').value = existing.comment;
    }

    // ICT要望テーブルの復元
    if (existing.ictRequest) {
      try {
        var items = JSON.parse(existing.ictRequest);
        if (Array.isArray(items) && items.length > 0) {
          renderIctRequestTable(items);
        }
      } catch(e) {
        // 旧形式（テキスト）の場合は1行目に入れる
        if (existing.ictRequest.trim()) {
          renderIctRequestTable([{ content: existing.ictRequest, name: '', room: '' }]);
        }
      }
    }
  }

  // ===== 送信 =====

  function submitForm() {
    hideMessage();

    var formData = {};
    var wantSecond = document.getElementById('wantSecond').checked;

    // 1回目 支援種別・時間帯
    formData.supportType = getSupportType(1);
    if (formData.supportType === 'オンライン' && !validateOnlineTime(1)) {
      showMessage('1回目支援のオンライン時間帯が不正です（1時間以上を指定してください）。', 'error');
      return;
    }
    formData.timeSlot = getTimeSlot(1);

    // 1回目 候補日
    var fields = [
      { key: 'v1c1', label: '1回目 第1候補' },
      { key: 'v1c2', label: '1回目 第2候補' },
      { key: 'v1c3', label: '1回目 第3候補' }
    ];

    if (wantSecond) {
      // 2回目 支援種別・時間帯
      formData.supportType2 = getSupportType(2);
      if (formData.supportType2 === 'オンライン' && !validateOnlineTime(2)) {
        showMessage('2回目支援のオンライン時間帯が不正です（1時間以上を指定してください）。', 'error');
        return;
      }
      formData.timeSlot2 = getTimeSlot(2);

      fields.push({ key: 'v2c1', label: '2回目 第1候補' });
      fields.push({ key: 'v2c2', label: '2回目 第2候補' });
      fields.push({ key: 'v2c3', label: '2回目 第3候補' });
    }

    for (var i = 0; i < fields.length; i++) {
      var f = fields[i];
      var dateRadio = document.getElementById(f.key + '_type_date');
      var dateInput = document.getElementById(f.key + '_date');

      if (dateRadio.checked) {
        if (!dateInput.value) {
          showMessage(f.label + 'の日付を入力してください。', 'error');
          dateInput.focus();
          return;
        }
        var reason = getUnavailableReason(dateInput.value);
        if (reason) {
          showMessage(f.label + 'に選択できない日付が指定されています（' + reason + '）。', 'error');
          dateInput.focus();
          return;
        }
        formData[f.key] = dateInput.value;
      } else {
        formData[f.key] = NO_PREFERENCE;
      }
    }

    var v1Dates = [formData.v1c1, formData.v1c2, formData.v1c3].filter(function(d) { return d !== NO_PREFERENCE; });
    if (hasDuplicates(v1Dates)) {
      showMessage('1回目支援の候補日に同じ日付が含まれています。', 'error');
      return;
    }
    if (wantSecond) {
      var v2Dates = [formData.v2c1, formData.v2c2, formData.v2c3].filter(function(d) { return d !== NO_PREFERENCE; });
      if (hasDuplicates(v2Dates)) {
        showMessage('2回目支援の候補日に同じ日付が含まれています。', 'error');
        return;
      }
    }

    formData.wantSecond = wantSecond;
    formData.comment = document.getElementById('comment').value.trim();

    // ICT要望テーブルをJSON化
    var ictItems = [];
    var ictRows = document.querySelectorAll('#ictRequestBody tr');
    for (var i = 0; i < ictRows.length; i++) {
      var row = ictRows[i];
      var content = row.querySelector('[data-field="content"]').value.trim();
      var name = row.querySelector('[data-field="name"]').value.trim();
      var room = row.querySelector('[data-field="room"]').value.trim();
      if (content || name || room) {
        ictItems.push({ content: content, name: name, room: room });
      }
    }
    formData.ictRequest = ictItems.length > 0 ? JSON.stringify(ictItems) : '';

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>送信中...';

    google.script.run
      .withSuccessHandler(function(result) {
        if (result.success) {
          showMessage(result.message || '候補日を送信しました。', 'success');
          btn.textContent = '送信完了';
          var now = new Date();
          var timeStr = now.getFullYear() + '/' +
            String(now.getMonth() + 1).padStart(2, '0') + '/' +
            String(now.getDate()).padStart(2, '0') + ' ' +
            String(now.getHours()).padStart(2, '0') + ':' +
            String(now.getMinutes()).padStart(2, '0');
          document.getElementById('submittedBanner').innerHTML =
            '<div class="submitted-banner"><span class="icon">&#10003;</span>' +
            '<span>送信済み（' + timeStr + '）- 内容を修正して再送信できます</span></div>';
          setTimeout(function() {
            btn.disabled = false;
            btn.textContent = '候補日を再送信する';
          }, 2000);
        } else {
          showMessage(result.message || '送信に失敗しました。', 'error');
          btn.disabled = false;
          btn.textContent = '候補日を送信する';
        }
      })
      .withFailureHandler(function(err) {
        showMessage('エラーが発生しました: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = '候補日を送信する';
      })
      .submitCandidates(formData);
  }

  // ===== 確定済みスケジュール（複数月対応） =====

  // 確定済み月リストとページインデックス
  var confirmedMonths = [];
  var confirmedPageIdx = 0;

  function renderConfirmedSchedules() {
    var area = document.getElementById('confirmedScheduleArea');
    var navArea = document.getElementById('confirmedNavArea');

    if (schoolSchedule.length === 0 && staffFullSchedule.length === 0) {
      area.innerHTML = '';
      navArea.style.display = 'none';
      return;
    }

    // 月のリストを抽出
    var monthSet = {};
    for (var i = 0; i < schoolSchedule.length; i++) monthSet[schoolSchedule[i].targetMonth] = true;
    for (var i = 0; i < staffFullSchedule.length; i++) monthSet[staffFullSchedule[i].targetMonth] = true;
    confirmedMonths = Object.keys(monthSet).sort();

    if (confirmedMonths.length === 0) { area.innerHTML = ''; navArea.style.display = 'none'; return; }

    // デフォルトは当月以降の最初の月、なければ最新月
    var now = new Date();
    var currentYM = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    confirmedPageIdx = confirmedMonths.length - 1; // 最新月をデフォルト
    for (var i = 0; i < confirmedMonths.length; i++) {
      if (confirmedMonths[i] >= currentYM) { confirmedPageIdx = i; break; }
    }

    renderConfirmedPage();
  }

  function changeConfirmedMonth(delta) {
    confirmedPageIdx += delta;
    if (confirmedPageIdx < 0) confirmedPageIdx = 0;
    if (confirmedPageIdx >= confirmedMonths.length) confirmedPageIdx = confirmedMonths.length - 1;
    renderConfirmedPage();
  }

  function renderConfirmedPage() {
    var area = document.getElementById('confirmedScheduleArea');
    var navArea = document.getElementById('confirmedNavArea');

    if (confirmedMonths.length === 0) { area.innerHTML = ''; navArea.style.display = 'none'; return; }

    var tm = confirmedMonths[confirmedPageIdx];
    var tp = tm.split('-');
    var year = parseInt(tp[0], 10);
    var month = parseInt(tp[1], 10);
    var monthLabel = year + '年' + month + '月';

    // ナビ表示
    navArea.style.display = 'block';
    document.getElementById('confirmedMonthLabel').textContent = monthLabel + ' 確定スケジュール';
    document.getElementById('confirmedPrev').disabled = (confirmedPageIdx === 0);
    document.getElementById('confirmedNext').disabled = (confirmedPageIdx === confirmedMonths.length - 1);

    var mySchoolSched = schoolSchedule.filter(function(s) { return s.targetMonth === tm; });
    var staffSched = staffFullSchedule.filter(function(s) { return s.targetMonth === tm; });

    var html = '';

    // 自校の訪問カレンダー
    html += '<div class="card" style="margin-bottom:16px;">';
    html += '<div style="font-weight:700; font-size:1rem; color:#202124; margin-bottom:12px;">自校の訪問予定</div>';
    if (mySchoolSched.length > 0) {
      html += renderConfirmedMonthCalendar(year, month, mySchoolSched, false);
    } else {
      html += '<div style="color:#9aa0a6; font-size:0.85rem; text-align:center; padding:20px 0;">この月の訪問予定はありません</div>';
    }
    html += '</div>';

    // 担当支援員の全体カレンダー
    if (staffSched.length > 0) {
      html += '<div class="card" style="margin-bottom:20px;">';
      html += '<div style="font-weight:700; font-size:0.95rem; color:#202124; margin-bottom:12px;">担当支援員の訪問スケジュール</div>';
      html += renderConfirmedMonthCalendar(year, month, staffSched, true);
      html += '<div class="legend">';
      html += '<div class="legend-item"><div class="legend-dot" style="background:#e8f0fe;border:1px solid #1a73e8;"></div>自校</div>';
      html += '<div class="legend-item"><div class="legend-dot" style="background:#f0f0f0;border:1px solid #ccc;"></div>他校</div>';
      html += '<div class="legend-item"><div class="legend-dot" style="background:#fff3e0;border:1px solid #e65100;"></div>代替支援員</div>';
      html += '</div>';
      html += '</div>';
    }

    area.innerHTML = html;
  }

  function renderConfirmedMonthCalendar(year, month, schedList, isStaffView) {
    var firstDay = new Date(year, month - 1, 1);
    var lastDay = new Date(year, month, 0);
    var startDow = firstDay.getDay();
    var daysInMonth = lastDay.getDate();

    var sMap = {};
    for (var i = 0; i < schedList.length; i++) {
      var s = schedList[i];
      if (!sMap[s.date]) sMap[s.date] = [];
      sMap[s.date].push(s);
    }

    var userData = JSON.parse('<?!= userData ?>');
    var mySchoolName = userData.schoolName;

    var html = '<table class="mini-cal"><thead><tr>';
    ['日','月','火','水','木','金','土'].forEach(function(d) { html += '<th>' + d + '</th>'; });
    html += '</tr></thead><tbody><tr>';
    for (var i = 0; i < startDow; i++) html += '<td class="empty"></td>';
    var cc = startDow;

    for (var d = 1; d <= daysInMonth; d++) {
      var ds = year + '-' + String(month).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      var dow = new Date(year, month - 1, d).getDay();
      var cls = '';
      if (dow === 0 || dow === 6) cls = 'weekend';
      else if (HOLIDAYS_2026[ds] || meetingMap[ds]) cls = 'holiday';
      else if (staffOffMap[ds]) cls = 'staff-off';
      else cls = 'available';

      html += '<td class="' + cls + '" style="vertical-align:top; height:50px;">';
      html += '<div style="font-size:0.72rem; color:#5f6368; margin-bottom:1px;">' + d + '</div>';

      if (sMap[ds]) {
        for (var j = 0; j < sMap[ds].length; j++) {
          var entry = sMap[ds][j];
          if (isStaffView) {
            var isMySchool = (entry.schoolName === mySchoolName);
            var isSubstitute = entry.origStaff && entry.origStaff !== '' && entry.staffName !== myStaffName;
            var schoolShort = entry.schoolName.replace('中学校', '');
            var chipBg = isMySchool
              ? (isSubstitute ? 'background:#fff3e0; color:#e65100; font-weight:700;' : 'background:#e8f0fe; color:#1a73e8; font-weight:700;')
              : (isSubstitute ? 'background:#fef7e0; color:#b8860b;' : 'background:#f0f0f0; color:#5f6368;');
            var label = schoolShort + (isSubstitute && isMySchool ? '(代替)' : '');
            html += '<div style="display:inline-block; padding:1px 5px; border-radius:3px; font-size:0.58rem; ' + chipBg + ' margin:1px 0;">' + esc(label) + '</div>';
          } else {
            var staffShort = entry.staffName.split(/[\s　]/)[0];
            var isSub = entry.origStaff && entry.origStaff !== '';
            var chipBg2 = isSub ? 'background:#fff3e0; color:#e65100;' : 'background:#e8f0fe; color:#1a73e8;';
            html += '<div style="display:inline-block; padding:1px 5px; border-radius:3px; font-size:0.62rem; font-weight:600; ' + chipBg2 + '">';
            html += esc(isSub ? '代替支援員' : staffShort);
            html += '</div>';
          }
        }
      }

      html += '</td>';
      cc++;
      if (cc % 7 === 0 && d < daysInMonth) html += '</tr><tr>';
    }
    var rem = 7 - (cc % 7);
    if (rem < 7) for (var i = 0; i < rem; i++) html += '<td class="empty"></td>';
    html += '</tr></tbody></table>';
    return html;
  }

  // ===== 担当支援員スケジュールカレンダー =====

  function renderStaffScheduleCalendar() {
    if (staffFullSchedule.length === 0) return;
    document.getElementById('staffScheduleCard').style.display = 'block';

    var year = calYear, month = calMonth;
    // スケジュールを日付マップに
    var sMap = {};
    for (var i = 0; i < staffFullSchedule.length; i++) {
      var s = staffFullSchedule[i];
      if (!sMap[s.date]) sMap[s.date] = [];
      sMap[s.date].push(s);
    }

    var firstDay = new Date(year, month - 1, 1);
    var lastDay = new Date(year, month, 0);
    var startDow = firstDay.getDay();
    var daysInMonth = lastDay.getDate();

    var html = '<table class="mini-cal"><thead><tr>';
    ['日','月','火','水','木','金','土'].forEach(function(d) { html += '<th>' + d + '</th>'; });
    html += '</tr></thead><tbody><tr>';
    for (var i = 0; i < startDow; i++) html += '<td class="empty"></td>';
    var cc = startDow;

    var userData = JSON.parse('<?!= userData ?>');
    var mySchoolName = userData.schoolName;

    for (var d = 1; d <= daysInMonth; d++) {
      var ds = year + '-' + String(month).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      var dow = new Date(year, month - 1, d).getDay();
      var cls = '';
      if (dow === 0 || dow === 6) cls = 'weekend';
      else if (HOLIDAYS_2026[ds] || meetingMap[ds]) cls = 'holiday';
      else if (staffOffMap[ds]) cls = 'staff-off';
      else cls = 'available';

      html += '<td class="' + cls + '" style="vertical-align:top; height:50px;">';
      html += '<div style="font-size:0.72rem; color:#5f6368; margin-bottom:1px;">' + d + '</div>';

      if (sMap[ds]) {
        for (var j = 0; j < sMap[ds].length; j++) {
          var entry = sMap[ds][j];
          var isMySchool = (entry.schoolName === mySchoolName);
          var isSubstitute = entry.origStaff && entry.origStaff !== '' && entry.staffName !== myStaffName;
          var schoolShort = entry.schoolName.replace('中学校', '');
          var label, chipBg;
          if (isMySchool) {
            label = schoolShort;
            chipBg = isSubstitute
              ? 'background:#fff3e0; color:#e65100; font-weight:700;'
              : 'background:#e8f0fe; color:#1a73e8; font-weight:700;';
            if (isSubstitute) label += '(代替)';
          } else {
            label = schoolShort;
            chipBg = isSubstitute
              ? 'background:#fef7e0; color:#b8860b;'
              : 'background:#f0f0f0; color:#5f6368;';
          }
          html += '<div style="display:inline-block; padding:1px 5px; border-radius:3px; font-size:0.58rem; ' + chipBg + ' margin:1px 0;">' + esc(label) + '</div>';
        }
      }

      html += '</td>';
      cc++;
      if (cc % 7 === 0 && d < daysInMonth) html += '</tr><tr>';
    }
    var rem = 7 - (cc % 7);
    if (rem < 7) for (var i = 0; i < rem; i++) html += '<td class="empty"></td>';
    html += '</tr></tbody></table>';

    html += '<div class="legend">';
    html += '<div class="legend-item"><div class="legend-dot" style="background:#e8f0fe;border:1px solid #1a73e8;"></div>自校</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:#f0f0f0;border:1px solid #ccc;"></div>他校</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:#fff3e0;border:1px solid #e65100;"></div>代替支援員（自校）</div>';
    html += '<div class="legend-item"><div class="legend-dot" style="background:#fef7e0;border:1px solid #b8860b;"></div>代替支援員（他校）</div>';
    html += '</div>';

    document.getElementById('staffScheduleArea').innerHTML = html;
  }

  // ===== 日付バリデーション =====

  function getUnavailableReason(dateStr) {
    if (!dateStr) return null;
    var d = new Date(dateStr);
    var dow = d.getDay();
    if (dow === 0) return '日曜日';
    if (dow === 6) return '土曜日';
    if (HOLIDAYS_2026[dateStr]) return HOLIDAYS_2026[dateStr];
    if (meetingMap[dateStr]) return meetingMap[dateStr];
    if (staffOffMap[dateStr]) return '支援員休日';
    return null;
  }

  // ===== ユーティリティ =====

  function hasDuplicates(arr) {
    var seen = {};
    for (var i = 0; i < arr.length; i++) {
      if (seen[arr[i]]) return true;
      seen[arr[i]] = true;
    }
    return false;
  }

  function formatMonth(ym) {
    if (!ym) return '';
    var p = ym.split('-');
    return p.length === 2 ? p[0] + '年' + parseInt(p[1], 10) + '月分' : ym;
  }

  function formatDateLabel(d) {
    if (!d) return '';
    var p = d.split('-');
    return p.length === 3 ? parseInt(p[1], 10) + '月' + parseInt(p[2], 10) + '日' : d;
  }

  function fmtDateInput(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showMessage(text, type) {
    var el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + type;
  }
  function hideMessage() {
    document.getElementById('message').className = 'message';
  }
</script>
